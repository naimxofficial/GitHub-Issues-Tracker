<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Homepage</title>
    <!-- daisy UI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- fontawsome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header class="navbar bg-white shadow-sm flex justify-between items-center p-4 mb-6">
        <div class="flex justify-between items-center gap-1">
            <i class="fa-brands fa-github text-4xl"></i>
            <h2 class="lg:text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div class="lg:flex gap-1 items-center">
            <input oninput="searchIssues(event)" type="text" placeholder="🔍 Search issues..."
                class="input input-bordered w-full md:w-auto" />
            <button class="btn btn-xs sm:btn-sm md:btn-md  btn-primary">+ New Issue</button>
        </div>
    </header>

    <main class="bg-[#F8FAFC] container w-11/12 mx-auto space-y-4">
        <!-- Tab bar -->
        <section id="tab" class="p-4 flex gap-2 bg-white items-center rounded-lg drop-shadow-lg">
            <button onclick="filterIssues('all',event)" class="btn btn-primary btns">All</button>
            <button onclick="filterIssues('open',event)" class="btn btns">Open</button>
            <button onclick="filterIssues('closed',event)" class="btn btns">Closed</button>
        </section>

        <!-- Issues bar -->
        <section class="bg-white p-4 flex items-center justify-between">
            <div class="flex gap-2 items-center">
                <img src="./assets/Aperture.png" alt="" class="bg-[#ECE4FF] rounded-full p-2">
                <div class="">
                    <h2 class="font-semibold text-lg"><span id="issue-count"></span> Issues</h2>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex items-center gap-1">
                <span class="p-1.5 rounded-full bg-[#00A96E]"></span>
                <h2 class="font-medium">Open</h2>
                <br>
                <span class="p-1.5 rounded-full bg-[#A855F7]"></span>
                <h2 class="font-medium">Closed</h2>
            </div>
        </section>

        <!-- loading spinner -->
        <div id="loadingSpinner" class=" justify-center items-center h-[50vh] flex hidden">
            <span class="loading w-[50px] loading-spinner text-primary"></span>
        </div>

        <!-- Cards -->
        <section>
            <div id="allIssuesContainer" class="bg-[#FBFBFB] grid grid-cols-1 lg:grid-cols-4 gap-3 p-3"></div>
            <!-- <div class="border-t-4 border-t-[#00A96E] rounded-sm p-4 space-y-3 bg-white drop-shadow-sm">

                    <h2 class="text-[#D97706] bg-[#FDE68A] rounded-full py-2 px-5 font-medium text-xs"><i

                    <p>#1 by john_doe</p>
                    <p>1/15/2024</p>
                </div>

            </div> -->

        </section>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div id="modalContainer" class="bg-white p-6 rounded-xl">



                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>

    <script src="./script.js"></script>
</body>

</html>
