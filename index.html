<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker | Login</title>
    <!-- daisy UI and Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Geist font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- css -->
    <link rel="stylesheet" href="./style.css">
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
</head>

<body>
    <main class="mx-auto max-w-sm  bg-[#F8FAFC]">
        <section class="p-8 space-y-4 bg-white rounded-lg shadow-2xl">
            <div class="text-center">
                <img src="./assets/github-logo.png" alt="" class="mb-6 mx-auto">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <div>
                <fieldset class="fieldset w-xs p-4">

                    <label class="font-medium">Username</label>
                    <input value="admin" id="usernameInput" type="text" class="input" placeholder="Enter Username" />
                    <p class="text-primary mb-2">Default: admin</p>

                    <label  class="font-medium">Password</label>
                    <input value="admin123" id="passwordInput" type="password" class="input" placeholder="Enter Password" />
                    <p class="text-primary mb-2">Default: admin123</p>

                    <button class="btn btn-primary mt-2" id="signInBtn">Sign In</button>
                </fieldset>
            </div>

            <div class="divider flex justify-center items-center">
                OR
            </div>
            <div>
                <h2 class="text-[#64748B] text-center mb-2">Demo Credentials:</h2>
                <div class="bg-[#F8FAFC] p-4 text-center">
                    <p><span class="font-semibold">Username:</span> admin</p>
                    <p><span class="font-semibold">Password:</span> admin123</p>
                </div>
            </div>

        </section>
    </main>
    <script src="./signIn.js"></script>
</body>

</html>
